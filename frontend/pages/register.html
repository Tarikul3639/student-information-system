<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Register – Student Information System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/student-information-system/frontend/assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e293b',
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-8">

    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-4 shadow-lg">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
            <p class="text-slate-500 mt-1">Student Information System</p>
        </div>

        <!-- Register Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-xl font-semibold text-slate-700 mb-6 text-center">Register</h2>

            <!-- Error Container -->
            <div id="error-container" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <ul id="error-list" class="text-sm text-red-600 space-y-1"></ul>
            </div>

            <form id="register-form" class="space-y-4">
                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="full_name" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none"
                        placeholder="Enter full name">
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required minlength="3"
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none"
                        placeholder="Choose a username">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none"
                        placeholder="Enter email address">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required minlength="8"
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none"
                        placeholder="Min 8 characters">
                    <p class="text-xs text-slate-400 mt-1">Must contain uppercase, lowercase, and number</p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                    <input type="password" id="confirm_password" required
                        class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-accent outline-none"
                        placeholder="Re-enter password">
                </div>

                <!-- Submit -->
                <button type="submit" id="register-btn"
                    class="w-full bg-primary text-white py-2.5 rounded-lg font-medium hover:bg-slate-800 focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors flex items-center justify-center gap-2">
                    <span>Create Account</span>
                    <svg id="register-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>

            <!-- Login Link -->
            <p class="text-center text-sm text-slate-500 mt-6">
                Already have an account?
                <a href="/student-information-system/frontend/pages/login.html" class="text-accent hover:underline font-medium">Sign in</a>
            </p>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">&copy; 2025 Student Information System. All rights reserved.</p>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/student-information-system/frontend/assets/js/axios-config.js"></script>
    <script src="/student-information-system/frontend/assets/js/auth.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('sis_user')) {
            window.location.href = '/student-information-system/frontend/pages/dashboard.html';
        }

        // Client-side validation
        document.getElementById('register-form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password.length < 8) {
                e.preventDefault();
                showToast('Password must be at least 8 characters', 'error');
                return;
            }
            if (password !== confirm) {
                e.preventDefault();
                showToast('Passwords do not match', 'error');
                return;
            }
        });
    </script>
</body>
</html>
